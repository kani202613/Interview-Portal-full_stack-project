<!DOCTYPE html>
<html>
<head>
    <title>Interview Practice Portal</title>
</head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh; background:#f5f5f5;">

    <div style="padding:25px; width:300px; background:white; box-shadow:0 4px 12px gray;align-items: center; border-radius:10px;">
        
        <h2 style="text-align:center;">Register</h2>

        <form id="registerForm">
            
            <center><label  >Name:</label>
            <input type="text" id="name" required><br><br>

            <label>Email:</label>
            <input type="email" id="email" required><br><br>

            <label>Password:</label>
            <input type="password" id="password" required><br><br>

            <button type="submit">Register</button>
</center>
        </form>
    </div>

<script>
document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const userData = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    try {
        const response = await fetch("http://localhost:8080/auth/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(userData)
        });

        if (response.ok) {
            alert("Registration Successful!");
            
            // 🔥 Redirect to dashboard
            window.location.href = "dashboard.html";
            
        } else {
            alert("Registration Failed");
        }

    } catch (error) {
        alert("Server not connected");
    }
});
</script>

</body>
</html>
