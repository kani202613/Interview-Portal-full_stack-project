<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
    background:#f4f6f9;
}

.container{
    max-width:900px;
    margin:60px auto;
    background:#fff;
    padding:40px;
    border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.header a{
    text-decoration:none;
    color:#2563eb;
    font-size:14px;
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    background:#2563eb;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    margin-bottom:20px;
}

h3{
    margin-bottom:10px;
}

p{
    color:#6b7280;
    margin-bottom:6px;
}

button{
    padding:8px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-top:10px;
}

.edit-btn{
    background:#1f2937;
    color:white;
}

.save-btn{
    background:#2563eb;
    color:white;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    margin-top:40px;
}

.stat-card{
    background:#f9fafb;
    padding:20px;
    border-radius:8px;
    border:1px solid #e5e7eb;
}

input{
    width:100%;
    padding:8px;
    margin-bottom:10px;
    border:1px solid #e5e7eb;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <h2>User Profile</h2>
    <div>
        <a href="dashboard.html">← Back</a>
        &nbsp;&nbsp;
        <a href="#" onclick="logout()">Logout</a>
    </div>
</div>

<div class="avatar" id="avatar">U</div>

<div id="profileView">
    <h3 id="name"></h3>
    <p id="email"></p>
    <button class="edit-btn" onclick="enableEdit()">Edit Profile</button>
</div>

<div id="profileEdit" style="display:none;">
    <input type="text" id="editName" placeholder="Name">
    <input type="email" id="editEmail" placeholder="Email">
    <input type="text" id="editRole" placeholder="Role">
    <button class="save-btn" onclick="saveProfile()">Save Changes</button>
</div>

<div class="stats">
    <div class="stat-card">
        <h4>Tests Completed</h4>
        <p id="tests">0</p>
    </div>
    <div class="stat-card">
        <h4>Average Score</h4>
        <p id="avgScore">0%</p>
    </div>
    
    
</div>

</div>

<script>

let currentUser = JSON.parse(localStorage.getItem("user")) || {};

function loadProfile(){

    if(!currentUser.name){
        alert("Please login first");
        window.location.href = "login.html";
        return;
    }

    document.getElementById("name").innerText = currentUser.name;
    document.getElementById("email").innerText = "Email: " + currentUser.email;
    document.getElementById("role").innerText = "Role: " + (currentUser.role || "Student");
    document.getElementById("joined").innerText = 
        "Member Since: " + (currentUser.joined || new Date().toDateString());

    document.getElementById("avatar").innerText =
        currentUser.name.charAt(0).toUpperCase();

    document.getElementById("tests").innerText = currentUser.tests || 0;
    document.getElementById("avgScore").innerText = (currentUser.avgScore || 0) + "%";
    document.getElementById("roadmaps").innerText = currentUser.roadmaps || 0;
    document.getElementById("streak").innerText = (currentUser.streak || 0) + " Days";
}

function enableEdit(){
    document.getElementById("profileView").style.display="none";
    document.getElementById("profileEdit").style.display="block";

    document.getElementById("editName").value=currentUser.name;
    document.getElementById("editEmail").value=currentUser.email;
    document.getElementById("editRole").value=currentUser.role;
}

function saveProfile(){

    currentUser.name = document.getElementById("editName").value.trim();
    currentUser.email = document.getElementById("editEmail").value.trim();
    currentUser.role = document.getElementById("editRole").value.trim();

    localStorage.setItem("user", JSON.stringify(currentUser));

    document.getElementById("profileEdit").style.display="none";
    document.getElementById("profileView").style.display="block";

    loadProfile();
}

function logout(){
    localStorage.removeItem("user");
    window.location.href="login.html";
}

loadProfile();

</script>
</body>
</html>
